<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakty | Stellar Dynamics</title>
    <link rel="stylesheet" href="./assets/main.css">
</head>
<body>
    <header class="site-header">
        <div class="site-header__inner">
            <a class="site-header__logo" href="./index.html">
                <img src="./assets/images/logo.svg" alt="Logo" width="40" height="40">
                Stellar Dynamics
            </a>
            <nav class="site-header__nav">
                <menu>
                    <li><a href="./index.html">Domov</a></li>
                    <li><a href="./produkty.html">Produkty</a></li>
                    <li><a href="./kontakty.html" aria-current="page">Kontakty</a></li>
                </menu>
            </nav>
        </div>
    </header>

    <main class="contacts-page">
        <h1 class="section-title" style="text-align:center; margin-top:2rem;">Kontaktujte nás</h1>
        
        <div class="contacts-layout">
            <div class="contacts-info-pane">
                <div class="info-card">
                    <h3>Obecná Podpora</h3>
                    <p>support@stellardynamics.pslib.cz</p>
                </div>
                <div class="info-card">
                    <h3>Studio lokace</h3>
                    <p>Liberec, Česká Republika</p>
                </div>
            </div>

            <form class="contact-form" id="contact-form" onsubmit="event.preventDefault(); alert('Zpráva byla úspěšně odeslána!');">
                <div class="form-group row-anon">
                    <label class="checkbox-container">
                        <input type="checkbox" id="anon-checkbox">
                        <span class="custom-checkmark"></span>
                        Poslat zprávu anonymně
                    </label>
                </div>

                <div class="form-group" id="name-group">
                    <label for="sender-name">Vaše jméno / přezdívka</label>
                    <input type="text" id="sender-name" placeholder="Zadejte jméno..." required>
                </div>

                <div class="form-group">
                    <label for="sender-msg">Zpráva</label>
                    <textarea id="sender-msg" rows="5" placeholder="Napište nám text vaší zprávy..." required></textarea>
                </div>

                <button type="submit" class="btn btn--primary">Odeslat feedback</button>
            </form>
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Stellar Dynamics. Všechna práva vyhrazena.</p>
    </footer>

    <script>
        const anonCheckbox = document.getElementById('anon-checkbox');
        const nameGroup = document.getElementById('name-group');
        const nameInput = document.getElementById('sender-name');

        anonCheckbox.addEventListener('change', function() {
            if (this.checked) {
                nameGroup.style.display = 'none'; // Čistě skryje pole z layoutu
                nameInput.removeAttribute('required'); // Vypne HTML5 validaci povinného pole
                nameInput.value = ''; // Vyčistí případný zadaný text
            } else {
                nameGroup.style.display = 'flex'; // Navrátí pole do flexboxu formuláře
                nameInput.setAttribute('required', 'required'); // Zapne zpět povinnost vyplnění
            }
        });
    </script>
</body>
</html>
